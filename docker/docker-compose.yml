services:
  ihy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Bump to reinstall the latest spotdl, e.g.:
        #   SPOTDL_REFRESH=$(date +%s) docker compose up -d --build
        SPOTDL_REFRESH: "${SPOTDL_REFRESH:-1}"
    container_name: ihy
    ports:
      - "8000:8000"
    environment:
      # Set the real value in a .env file next to this compose file:
      #   IHY_SECRET_KEY=<output of `openssl rand -hex 32`>
      IHY_SECRET_KEY: "${IHY_SECRET_KEY:-change-me-in-production}"
      # HTTPS is on by default: a self-signed certificate is generated on
      # first start into /data/ssl (persists in the data volume). Options:
      #   IHY_SSL=off                                  -> plain HTTP
      #   IHY_SSL_SAN=IP:192.168.1.10,DNS:ihy.home     -> extra cert names
      # To use your own certificate, mount it and set IHY_SSL_CERT/IHY_SSL_KEY.
      IHY_SSL: "${IHY_SSL:-auto}"
      IHY_SSL_SAN: "${IHY_SSL_SAN:-}"
    volumes:
      - ihy-data:/data
      # Mount your music in a docker-compose.override.yml next to this file
      # (gitignored, merged automatically by Compose), e.g.:
      #   services:
      #     ihy:
      #       volumes:
      #         - /path/to/your/music:/music
      # Remote sources (SMB/NFS) should be mounted on the host first,
      # then passed through like any local path.
    restart: unless-stopped

volumes:
  ihy-data:
